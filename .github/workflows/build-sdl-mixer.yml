name: Build SDL_mixer

on:
  workflow_call:
    inputs:
      version:
        description: "SDL_mixer version"
        required: true
        type: string

jobs:
  build-windows:
    name: Download Windows
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
          arch: [x64, x86, arm64]
    steps:
      - name: Cache
        uses: actions/cache@v4
        id: cache-windows
        with:
          path: SDL3_mixer.dll
          key: sdl-mixer-windows-${{ inputs.version }}-${{ matrix.arch }}
      - name: Download release build
        if: steps.cache-windows.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/libsdl-org/SDL_mixer/releases/download/release-${{ inputs.version }}/SDL3_mixer-${{ inputs.version }}-win32-${{ matrix.arch }}.zip
          unzip SDL3_mixer-${{ inputs.version }}-win32-${{ matrix.arch }}.zip SDL3_mixer.dll
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with: 
            name: sdl-mixer-windows-${{ matrix.arch }}
            path: SDL3_mixer.dll

  build-linux:
    strategy:
      matrix:
        include:
          - arch: x64
            runs-on: ubuntu-latest
            container: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
            container: registry.gitlab.steamos.cloud/steamrt/sniper/sdk/arm64:latest
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    steps:
      - name: Set up Ninja
        uses: aseprite/get-ninja@main
      - name: Set up Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install \
          cmake \
          libasound2-dev \
          libflac-dev \
          libfluidsynth-dev \
          libgme-dev \
          libmpg123-dev \
          libopusfile-dev \
          libvorbis-dev \
          libxmp-dev \
          libwavpack-dev \
          ninja-build \
          pkg-config \
          ${NULL+}
      - name: Clone SDL_mixer
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL_mixer
          ref: release-${{ inputs.version }}
          submodules: recursive
          fetch-depth: 1
      - name: Download SDL
        uses: actions/download-artifact@v4
        with:
          name: sdl-linux-${{ matrix.arch }}
          path: sdl
      - name: Check that versioning is consistent
        # We only need to run this once: arbitrarily use the Linux build
        run: ./build-scripts/test-versioning.sh
      - name: Configure
        # -DSDLMIXER_MP3_MPG123=OFF is required as it fails on arm64
        run: >
          cmake -G Ninja
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          -DCMAKE_BUILD_TYPE=Release
          -DSDLMIXER_FLAC=ON
          -DSDLMIXER_FLAC_LIBFLAC=ON
          -DSDLMIXER_GME=ON
          -DSDLMIXER_MOD_XMP=ON
          -DSDLMIXER_MP3_MPG123=${{ matrix.arch == 'arm64' && 'OFF' || 'ON' }}
          -DSDLMIXER_OPUS=ON
          -DSDLMIXER_VORBIS=VORBISFILE
          -DBUILD_SHARED_LIBS=ON
          -DSDL_DISABLE_INSTALL=ON
          -DSDLMIXER_INSTALL=OFF
          -DSDLMIXER_VENDORED=ON
          -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/sdl
          -S . -B build
      - name: Build
        run: cmake --build build --config Release
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with: 
            name: sdl-mixer-linux-${{ matrix.arch }}
            path: build/*.so.0

  build-macos:
    name: Build MacOS (${{ matrix.platform.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
          platform:
          - {arch: 'arm64', flags: '-DSDL_CPU_ARM64=ON'}
          - {arch: 'x86_64', flags: '-DSDL_CPU_X64=ON'}
    steps:
      - name: Set up Ninja
        uses: aseprite/get-ninja@main
      - name: Setup MacOS dependencies
        run: |
          brew install \
          libtool \
          flac \
          fluidsynth \
          game-music-emu \
          libvorbis \
          libxmp \
          mpg123 \
          opusfile \
          wavpack \
          ${NULL+}
      - name: Clone SDL_mixer
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL_mixer
          ref: release-${{ inputs.version }}
          submodules: recursive
          fetch-depth: 1
      - name: Download SDL
        uses: actions/download-artifact@v4
        with:
          name: sdl-apple-macOS-${{ matrix.platform.arch }}
          path: sdl
      - name: Configure
        run: >
          cmake -G Ninja
          -DCMAKE_OSX_ARCHITECTURES="${{ matrix.platform.arch }}"
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          -DCMAKE_BUILD_TYPE=Release
          -DSDLMIXER_FLAC=ON
          -DSDLMIXER_FLAC_LIBFLAC=ON
          -DSDLMIXER_GME=ON
          -DSDLMIXER_MOD_XMP=ON
          -DSDLMIXER_MP3_MPG123=ON
          -DSDLMIXER_OPUS=ON
          -DSDLMIXER_VORBIS=VORBISFILE
          -DBUILD_SHARED_LIBS=ON
          -DSDL_DISABLE_INSTALL=ON
          -DSDLMIXER_INSTALL=OFF
          -DSDLMIXER_VENDORED=ON
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/sdl/install"
          ${{ matrix.platform.flags }}
          -S . -B build
      - name: Build
        run: cmake --build build --config Release
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with: 
            name: sdl-mixer-apple-macOS-${{ matrix.platform.arch }}
            path: build/*.dylib
