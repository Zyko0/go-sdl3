name: Build SDL_ttf

on:
  workflow_call:
    inputs:
      version:
        description: "SDL_ttf version"
        required: true
        type: string

jobs:
  build-windows:
    name: Download Windows
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
          arch: [x64, x86, arm64]
    steps:
      - name: Cache
        uses: actions/cache@v4
        id: cache-windows
        with:
          path: SDL3_ttf.dll
          key: sdl-ttf-windows-${{ inputs.version }}-${{ matrix.arch }}
      - name: Download release build
        if: steps.cache-windows.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/libsdl-org/SDL_ttf/releases/download/release-${{ inputs.version }}/SDL3_ttf-${{ inputs.version }}-win32-${{ matrix.arch }}.zip
          unzip SDL3_ttf-${{ inputs.version }}-win32-${{ matrix.arch }}.zip SDL3_ttf.dll
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with: 
            name: sdl-ttf-windows-${{ matrix.arch }}
            path: SDL3_ttf.dll

  build-linux:
    strategy:
      matrix:
        include:
          - arch: x64
            runs-on: ubuntu-latest
            container: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
            container: registry.gitlab.steamos.cloud/steamrt/sniper/sdk/arm64:latest
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    steps:
      - name: Set up Ninja
        uses: aseprite/get-ninja@main
      - name: Set up Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install \
            cmake \
            file \
            fonts-dejavu-core \
            libfreetype-dev \
            libharfbuzz-dev \
            pkg-config \
            ${NULL+}
      - name: Clone SDL_ttf
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL_ttf
          ref: release-${{ inputs.version }}
          submodules: recursive
          fetch-depth: 1
      - name: Check that versioning is consistent
        # We only need to run this once: arbitrarily use the Linux build
        run: ./build-scripts/test-versioning.sh
      - name: Download SDL
        uses: actions/download-artifact@v4
        with:
          name: sdl-linux-${{ matrix.arch }}
          path: sdl
      - name: Configure
        # TODO: PLUTOSVG, HARFBUZZ need a more recent freetype version
        run: >
          cmake -G Ninja
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          -DBUILD_SHARED_LIBS=ON
          -DSDLTTF_HARFBUZZ=OFF
          -DSDLTTF_PLUTOSVG=OFF
          -DSDLTTF_WERROR=ON
          -DCMAKE_BUILD_TYPE=Release
          -DSDL_DISABLE_INSTALL=ON
          -DSDLTTF_INSTALL_MAN=OFF
          -DSDLTTF_VENDORED=ON
          -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/sdl
          -S . -B build
      - name: Build
        run: cmake --build build --config Release
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with: 
            name: sdl-ttf-linux-${{ matrix.arch }}
            path: build/*.so.0

  build-macos:
    name: Build MacOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
          arch: [arm64, x86_64]
    steps:
      - name: Set up Ninja
        uses: aseprite/get-ninja@main
      - name: Setup MacOS dependencies
        run: |
            brew install \
              freetype \
              harfbuzz \
              ${NULL+}
      - name: Clone SDL_ttf
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL_ttf
          ref: release-${{ inputs.version }}
          submodules: recursive
          fetch-depth: 1
      - name: Download SDL
        uses: actions/download-artifact@v4
        with:
          name: sdl-apple-macOS-${{ matrix.arch }}
          path: sdl
      - name: Configure
        run: >
          cmake -G Ninja
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          -DBUILD_SHARED_LIBS=ON
          -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}"
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          -DSDLTTF_HARFBUZZ=ON
          -DSDLTTF_WERROR=ON
          -DCMAKE_BUILD_TYPE=Release
          -DSDL_DISABLE_INSTALL=ON
          -DSDLTTF_INSTALL_MAN=OFF
          -DSDLTTF_VENDORED=ON
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/sdl/install"
          -S . -B build
      - name: Build
        run: cmake --build build --config Release
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with: 
            name: sdl-ttf-apple-macOS-${{ matrix.arch }}
            path: build/*.dylib
